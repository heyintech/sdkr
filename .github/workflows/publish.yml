name: Publish / npm

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to publish
        required: true
        type: string
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Resolve publish ref
        id: publish-ref
        run: |
          REF="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REF="${{ github.event.inputs.tag }}"
          fi
          echo "value=$REF" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.publish-ref.outputs.value }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure npm for Trusted Publishing
        run: |
          mkdir -p ~/.npm
          cat > ~/.npmrc <<'EOF'
          registry=https://registry.npmjs.org/
          //registry.npmjs.org/:_authToken=${{ secrets.NPM_PUBLISH_TOKEN }}
          EOF

      - name: Publish nuxt + cli packages with pnpm workspaces
        run: pnpm -r --filter "@heyintech/sdkr-nuxt" --filter "@heyintech/sdkr-cli" publish --access public
