name: CI / Build + Bump + Tag

on:
  push:
    branches:
      - main

jobs:
  build:
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint/test/build
        run: pnpm test && pnpm --filter "@heyintech/sdkr-cli" build && pnpm --filter "@heyintech/sdkr-nuxt" build

      - name: Bump version using bumpp (patch) for nuxt + cli packages
        id: bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npx bumpp patch packages/nuxt/package.json packages/cli/package.json --tag --message "chore(release): v%s" --yes --no-push
          TAG="$(git tag --points-at HEAD --sort=-creatordate | head -n 1)"
          [ -n "$TAG" ] || { echo "Expected a release tag on HEAD after bumpp."; exit 1; }
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          git push origin main --follow-tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: build
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish.yml
    with:
      tag: ${{ needs.build.outputs.tag }}
    secrets: inherit
