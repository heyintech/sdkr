name: CI / Build + Bump + Publish

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint/test/build
        run: pnpm test && pnpm --filter "@heyintech/sdkr-cli" build && pnpm --filter "@heyintech/sdkr-nuxt" build

      - name: Bump version using bumpp (patch) for nuxt + cli packages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npx bumpp patch packages/nuxt/package.json packages/cli/package.json --tag --message "[ci skip] chore(release): v%s"
          git push origin main --follow-tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure npm for Trusted Publishing
        run: |
          mkdir -p ~/.npm
          cat > ~/.npmrc <<'EOF'
          registry=https://registry.npmjs.org/
          //registry.npmjs.org/:_authToken=${{ secrets.NPM_PUBLISH_TOKEN }}
          EOF

      - name: Publish nuxt + cli packages with pnpm workspaces
        run: pnpm -r --filter "@heyintech/sdkr-nuxt" --filter "@heyintech/sdkr-cli" publish --access public
